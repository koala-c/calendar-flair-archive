name: Sync Flairs Data

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync Flair Discovery + Translations
        run: node scripts/syncFlairs.js

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/flair-discovery.json data/flair-keywords-multilang.json
          git diff --cached --quiet || git commit -m "chore: sync flair discovery data"
          git push
